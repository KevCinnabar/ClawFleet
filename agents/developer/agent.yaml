# Developer Agent 配置文件
agent:
  id: developer-001
  name: Developer Agent
  displayName: 开发者智能体
  role: developer
  version: "1.0.0"
  status: active

# LLM 配置
llm:
  provider: openai
  model: gpt-4-turbo
  temperature: 0.3
  maxTokens: 4096
  topP: 0.95
  frequencyPenalty: 0.0
  presencePenalty: 0.0

# 技能配置
skills:
  - id: code_generation
    name: 代码生成
    enabled: true
    description: 根据需求生成高质量代码

  - id: code_review
    name: 代码审查
    enabled: true
    description: 评审代码质量和安全性

  - id: bug_fixing
    name: 错误修复
    enabled: true
    description: 诊断和修复代码缺陷

  - id: documentation
    name: 文档编写
    enabled: true
    description: 生成技术文档和注释

  - id: testing
    name: 测试编写
    enabled: true
    description: 设计和实现单元测试

# 集成配置
integrations:
  github:
    enabled: true
    baseUrl: https://api.github.com
    timeout: 30
    retries: 3

  notion:
    enabled: false
    timeout: 30

  slack:
    enabled: true
    timeout: 15

# 工作流配置
workflow:
  timeout: 3600
  maxRetries: 3
  enableParallel: true
  maxParallelTasks: 5

# 性能指标
performance:
  expectedResponseTime: 30
  maxConcurrentTasks: 3
  throughput: 10
  availability: 0.99

# 协作配置
collaboration:
  collaborators:
    - manager
    - architect
    - tester
  communicationChannels:
    - slack
    - notion

# 日志与监控
logging:
  level: INFO
  format: json
  enableAudit: true
  auditLevel: DEBUG

monitoring:
  enableMetrics: true
  metricsPort: 9090
  enableTracing: true
  samplingRate: 1.0

# 安全配置
security:
  enableEncryption: true
  authType: jwt
  requiresApproval:
    - delete_code
    - deploy_production
  dataProtection:
    gdprCompliant: true
    enableAuditLog: true

# 资源限制
resources:
  maxMemory: 2048
  maxCpu: 2
  maxStorage: 10240
  maxApiCalls: 1000

# 版本兼容性
compatibility:
  openclaw:
    minVersion: "1.0.0"
    maxVersion: "2.0.0"
