services:
  manager:
    build:
      context: agents/manager
    container_name: claw-manager
    restart: unless-stopped
    ports:
      - "3001:18789"
    env_file:
      - ./agents/manager/.env
    volumes:
      - ./data/.openclaw/manager:/home/node/.openclaw
      - ./data/workspace:/home/node/.openclaw/workspace
      - ./data/agents/manager:/home/node/.openclaw/agents/manager
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - fleet-net

  developer:
    build:
      context: agents/developer
    container_name: claw-developer
    restart: unless-stopped
    ports:
      - "3002:18789"
    env_file:
      - ./agents/developer/.env
    volumes:
      - ./data/.openclaw/developer:/home/node/.openclaw
      - ./data/workspace:/home/node/.openclaw/workspace
      - ./data/agents/developer:/home/node/.openclaw/agents/developer
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - fleet-net

networks:
  fleet-net:
    driver: bridge