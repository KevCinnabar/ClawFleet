services:
  manager:
    build:
      context: agents/manager
    container_name: claw-manager
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - ./.env
    volumes:
      - ./data/.openclaw/manager:/data/.openclaw
      - ./data/workspace:/data/workspace
      - ./data/agents/manager:/data/agents/manager
    networks:
      - fleet-net

  developer:
    build:
      context: agents/developer
    container_name: claw-developer
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - ./.env
    volumes:
      - ./data/.openclaw/developer:/data/.openclaw
      - ./data/workspace:/data/workspace
      - ./data/agents/developer:/data/agents/developer
    networks:
      - fleet-net

networks:
  fleet-net:
    driver: bridge