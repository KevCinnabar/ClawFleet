# Developer Agent runtime config
agent:
  id: developer-001
  name: Developer Agent
  displayName: 开发者智能体
  role: developer
  version: "1.0.0"
  status: active

llm:
  provider: openai
  model: ${OPENAI_MODEL:-gpt-4.1-mini}
  temperature: 0.3
  maxTokens: 4096

integrations:
  github:
    enabled: true
  notion:
    enabled: true
  slack:
    enabled: true

workflow:
  maxRetries: 3
  timeout: 3600
